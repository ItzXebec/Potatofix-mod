name: Build PotatoFix

on:
  push:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - mc_version: "1.21.5"
            fabric_api: "0.128.1+1.21.5"
            loader: "0.16.14"
          - mc_version: "1.21.6"
            fabric_api: "0.128.1+1.21.6"
            loader: "0.16.14"
          - mc_version: "1.21.7"
            fabric_api: "0.128.1+1.21.7"
            loader: "0.16.14"
          - mc_version: "1.21.8"
            fabric_api: "0.133.4+1.21.8"
            loader: "0.16.14"
          - mc_version: "1.21.9"
            fabric_api: "0.134.1+1.21.9"
            loader: "0.16.14"
          - mc_version: "1.21.10"
            fabric_api: "0.138.4+1.21.10"
            loader: "0.16.14"
          - mc_version: "1.21.11"
            fabric_api: "0.141.3+1.21.11"
            loader: "0.16.14"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Cache Gradle files
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.mc_version }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            gradle-${{ matrix.mc_version }}-

      - name: Update gradle.properties for ${{ matrix.mc_version }}
        run: |
          sed -i "s/minecraft_version=.*/minecraft_version=${{ matrix.mc_version }}/" gradle.properties
          sed -i "s/fabric_api_version=.*/fabric_api_version=${{ matrix.fabric_api }}/" gradle.properties
          sed -i "s/loader_version=.*/loader_version=${{ matrix.loader }}/" gradle.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download Minecraft and generate sources
        run: ./gradlew genSources --no-daemon -Dorg.gradle.jvmargs="-Xmx2G"
        timeout-minutes: 30

      - name: Build with Gradle
        run: ./gradlew build --no-daemon -Dorg.gradle.jvmargs="-Xmx2G"
        timeout-minutes: 30

      - name: Upload JAR for ${{ matrix.mc_version }}
        uses: actions/upload-artifact@v4
        with:
          name: potatofix-${{ matrix.mc_version }}
          path: build/libs/potatofix-*.jar
